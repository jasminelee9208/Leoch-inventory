<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Leoch Inventory</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 5px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      height: 70px;
    }

    .header h2 {
      margin: 0;
      font-size: 32px
    }
    
    #lastUpdated {
      color: #666;
      margin-bottom: 15px;
    }

    .filters {
      margin-bottom: 15px;
    }

    input, select {
      padding: 5px;
      font-size: 14px;
      margin-right: 5px;
    }

    table {
      border-collapse: collapse;
      width: 80%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #f2f2f2;
    }

    tr.hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- Header with Logo -->
<div class="header">
  <img src="logo.png" alt="Leoch Logo" class="logo">
  <h2>Leoch Inventory</h2>
</div>
  
<p id="lastUpdated"></p>

<div class="filters">
<!-- Search box -->
  <input
    type="text"
    id="search"
    placeholder="Search by part number..."
    onkeyup="applyFilters()"
  >

<!-- Location dropdown -->
  <select id="locationFilter" onchange="applyFilters()">
    <option value="">All Locations</option>
  </select>
</div>

<table id="inventoryTable">
  <thead>
    <tr>
      <th>Material</th>
      <th>Part Number</th>
      <th>Location</th>
      <th>Available Qty</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const locations = new Set();

// ✅ FINAL location mapping
const locationMap = {
  "U001": "Lake Forest, CA",
  "U008": "CA AGED",
  "U009": "TX AGED",
  "U024": "Dallas, TX"
};

// ✅ Only keep these locations
const allowedLocations = new Set(["U001","U008","U009","U024"]);

async function loadExcel(file) {
  const res = await fetch(file + "?v=" + Date.now());
  const data = await res.arrayBuffer();

  const workbook = XLSX.read(data);
  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  return XLSX.utils.sheet_to_json(sheet);
}

async function loadInventory() {

  const files = ["N010.xlsx", "N050.xlsx"];
  const grouped = {};

  for (const file of files) {

    const rows = await loadExcel(file);

    rows.forEach(row => {

      const material = row["Material"];
      const part = row["Leoch Part Number"];
      const loc = row["Sto.Loction"];
      const qty = parseFloat(row["Qty.Avail"]);

      // ✅ FILTER
      if (!allowedLocations.has(loc)) return;
      if (!qty || qty <= 0) return;

      // ✅ GROUP KEY (material + location)
      const key = material + "|" + loc;

      if (!grouped[key]) {
        grouped[key] = {
          material,
          part,
          location: locationMap[loc],
          qty: 0
        };
      }

      // ✅ SUM QTY
      grouped[key].qty += qty;
    });
  }

  renderTable(grouped);
}

function renderTable(grouped) {

  const tbody = document.querySelector("#inventoryTable tbody");
  tbody.innerHTML = "";

  Object.values(grouped)
    .sort((a, b) => a.part.localeCompare(b.part)) // 🔥 auto sort
    .forEach(item => {

      locations.add(item.location);

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${item.material}</td>
        <td>${item.part}</td>
        <td>${item.location}</td>
        <td>${item.qty.toLocaleString()}</td>
      `;

      tbody.appendChild(tr);
    });

  populateLocationDropdown();
}

function populateLocationDropdown() {

  const select = document.getElementById("locationFilter");

  select.innerHTML = `<option value="">All Locations</option>`;

  Array.from(locations).sort().forEach(loc => {

    const opt = document.createElement("option");
    opt.value = loc;
    opt.textContent = loc;

    select.appendChild(opt);
  });
}

function applyFilters() {

  const search = document.getElementById("search").value.toUpperCase();
  const loc = document.getElementById("locationFilter").value;

  document.querySelectorAll("#inventoryTable tbody tr")
    .forEach(row => {

      const part = row.cells[1].innerText.toUpperCase();
      const rowLoc = row.cells[2].innerText;

      const show =
        part.includes(search) &&
        (!loc || rowLoc === loc);

      row.classList.toggle("hidden", !show);
    });
}

loadInventory();
</script>



</body>
</html>
